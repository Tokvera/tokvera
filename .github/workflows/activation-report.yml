name: activation-report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1"

jobs:
  activation-report:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TOKVERA_API_BASE_URL: ${{ secrets.TOKVERA_API_BASE_URL }}
      TOKVERA_ADMIN_TOKEN: ${{ secrets.TOKVERA_ADMIN_TOKEN }}
      TOKVERA_ACTIVATION_WINDOW_DAYS: "30"
      TOKVERA_ACTIVATION_LIMIT: "500"
      TOKVERA_ACTIVATION_REPORT_JSON: test/artifacts/activation-report.json
      TOKVERA_ACTIVATION_REPORT_MD: test/artifacts/activation-report.md
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate activation report
        run: node test/generate-activation-report.mjs

      - name: Upload activation report artifact
        uses: actions/upload-artifact@v4
        with:
          name: activation-report
          path: test/artifacts/
